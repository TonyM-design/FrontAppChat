<div class="container"><p>AJOUTER UN CANAL</p>
<form [formGroup]="form" (submit)="onClick()">
    <label for="canalname">Nom du canal à créer:</label>
    <input 
        type="text" 
        id="canalname" 
        name="canalname" 
        formControlName="canalname"
    ><br><br>
    <p [hidden]="form.valid">Le nom de votre canal doit faire moins de 10 caractères</p>
    <button [disabled]="form.invalid">Créer canal!</button>
</form>

</div>
